<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Chalker — League Admin</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141814;--surface:#1e251e;--s3:#2e382e;
  --green:#4a7c59;--gl:#5a9469;--amber:#e8c840;--red:#c0392b;
  --blue:#2a5a8c;--blue-l:#3a7abf;--blue-bg:#0a1a2a;
  --text:#e0d8c8;--dim:#8a9080;--border:#3a4a3a;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;margin:0}
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

/* Header */
#header{background:#0a1525;border-bottom:2px solid var(--blue);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:.05em;text-transform:uppercase;color:#8ac4ff;text-decoration:none}
.logo span{color:var(--amber)}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--blue-l);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.logout-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;cursor:pointer}
.logout-btn:hover{border-color:var(--red);color:#ff8080}

/* Tabs */
main{max-width:960px;margin:0 auto;padding:1.5rem 1rem 4rem}
.tabs{display:flex;margin-bottom:1.5rem;border-bottom:2px solid var(--border)}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.65rem 1rem;border:none;background:none;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#8ac4ff;border-bottom-color:#8ac4ff}

/* Panels */
.panel{display:none}
.panel.active{display:block}

/* Cards */
.card{background:#0d1e2e;border:1px solid var(--blue);border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.card h2{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#5a9abf;margin-bottom:1rem}

/* Form */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem}
.field label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
.field input,.field select{background:var(--bg);border:1px solid var(--blue);border-radius:4px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.9rem;padding:.45rem .6rem}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue-l)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1rem}
.btn-admin{background:var(--blue-bg);border:1px solid var(--blue);border-radius:6px;color:#8ac4ff;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.55rem 1.5rem;cursor:pointer}
.btn-admin:hover{background:#0f2a40;border-color:var(--blue-l)}
.btns{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:.55rem 1.25rem;cursor:pointer}
.st{font-size:.85rem;margin-top:.75rem}
.st.ok{color:var(--gl)}.st.err{color:var(--red)}

/* League list */
.league-item{background:var(--bg);border:1px solid var(--blue);border-radius:8px;padding:.75rem 1rem;margin-bottom:.75rem}
.league-name{font-weight:700;font-size:1rem;color:#8ac4ff;margin-bottom:.25rem}
.league-meta{font-size:.8rem;color:var(--dim);margin-bottom:.5rem}
.league-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.code-badge{background:var(--blue-bg);border:1px solid var(--blue);border-radius:4px;padding:2px 8px;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:#8ac4ff;letter-spacing:.06em}

/* Edit panel */
.edit-panel{display:none;background:#070f1a;border:1px solid var(--blue);border-radius:6px;padding:1rem;margin-top:.5rem}
.edit-panel.open{display:block}
.edit-panel h3{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#5a9abf;margin-bottom:.75rem}

/* Misc */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:#8ac4ff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
.nh{color:var(--dim);font-size:.9rem;text-align:center;padding:2rem}
.lh{color:var(--dim);font-size:.9rem;text-align:center;padding:2rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:white;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;padding:.6rem 1.5rem;border-radius:6px;transition:transform .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
</style>
</head>
<body>

<div id="header">
  <div>
    <a href="/" class="logo">Flight <span>Chalker</span></a>
    <div class="logo-sub">League Administration</div>
  </div>
  <button class="logout-btn" onclick="window.location.href='/'">Log Out</button>
</div>

<main>
  <div class="tabs">
    <button class="tab active" onclick="showTab('leagues')">Leagues</button>
    <button class="tab" onclick="showTab('create')">Create League</button>
    <button class="tab" onclick="showTab('fixtures')">Fixtures</button>
  </div>

  <!-- LEAGUES PANEL -->
  <div id="panel-leagues" class="panel active">
    <div id="leagues-list"><div class="lh"><span class="spin"></span> Loading leagues…</div></div>
  </div>

  <!-- FIXTURES PANEL -->
  <div id="panel-fixtures" class="panel">
    <div class="card">
      <h2>Add Fixture</h2>
      <div class="grid">
        <div class="field"><label>League</label>
          <select id="fx-league" onchange="loadFixtureTeams()">
            <option value="">— Select league —</option>
          </select>
        </div>
        <div class="field"><label>Season</label>
          <input type="number" id="fx-season" value="1" min="1">
        </div>
        <div class="field"><label>Date</label>
          <input type="date" id="fx-date">
        </div>
        <div class="field"><label>Home Team</label>
          <select id="fx-home"><option value="">— Select —</option></select>
        </div>
        <div class="field"><label>Away Team</label>
          <select id="fx-away"><option value="">— Select —</option></select>
        </div>
      </div>
      <button class="btn-admin" onclick="addFixture()"><span id="fx-spin" style="display:none" class="spin blue"></span>Add Fixture</button>
      <div class="st" id="fx-status"></div>
    </div>
    <div class="card" style="margin-top:1rem">
      <h2>Existing Fixtures</h2>
      <div class="field" style="margin-bottom:1rem">
        <label>Filter by League</label>
        <select id="fx-filter-league" onchange="loadFixtureList()">
          <option value="">— All leagues —</option>
        </select>
      </div>
      <div id="fixture-list"><div class="nh">Select a league to view fixtures</div></div>
    </div>
  </div>

  <!-- CREATE LEAGUE PANEL -->
  <div id="panel-create" class="panel">
    <div class="card">
      <h2>Create New League</h2>
      <div class="field"><label>League Name</label><input type="text" id="cl-name" placeholder="e.g. Monday Night Darts 2026"></div>
      <div class="field"><label>Admin Password</label><input type="password" id="cl-pw" placeholder="Password for this league"></div>
      <div class="field"><label>Match Night</label>
        <select id="cl-night"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Sunday</option></select>
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#5a9abf;margin-bottom:.75rem;margin-top:.25rem">Match Format</div>
      <div class="grid">
        <div class="field"><label>Singles</label><input type="number" id="cl-singles" value="6" min="1" max="12"></div>
        <div class="field"><label>Doubles</label><input type="number" id="cl-doubles" value="3" min="0" max="6"></div>
        <div class="field"><label>Team Game</label><select id="cl-teamgame"><option value="0">None</option><option value="3">3 players</option><option value="4" selected>4 players</option><option value="6">6 players</option></select></div>
        <div class="field"><label>Singles Score</label><input type="number" id="cl-sscore" value="501" min="101"></div>
        <div class="field"><label>Doubles Score</label><input type="number" id="cl-dscore" value="601" min="101"></div>
        <div class="field"><label>Team Score</label><input type="number" id="cl-tscore" value="1001" min="101"></div>
        <div class="field"><label>Singles Best Of</label><select id="cl-bosing"><option value="1">1 leg</option><option value="3" selected>Best of 3</option><option value="5">Best of 5</option></select></div>
        <div class="field"><label>Doubles Best Of</label><select id="cl-bodub"><option value="1">1 leg</option><option value="3" selected>Best of 3</option><option value="5">Best of 5</option></select></div>
        <div class="field"><label>Points Win</label><input type="number" id="cl-pwin" value="2" min="0"></div>
        <div class="field"><label>Points Draw</label><input type="number" id="cl-pdraw" value="1" min="0"></div>
        <div class="field"><label>Points Loss</label><input type="number" id="cl-ploss" value="0" min="0"></div>
      </div>
      <button class="btn-admin" onclick="createLeague()"><span id="cl-spin" style="display:none" class="spin"></span>Create League</button>
      <div class="st" id="cl-status"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SB='https://xkovqamknwyjzlgijcel.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrb3ZxYW1rbnd5anpsZ2lqY2VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzkxMTQsImV4cCI6MjA5NzAxNTExNH0.3KtXmzojAdvYbKLW0LP0BmfaqRz4oBEK7k0xFsGDmXI';

async function sb(path,opts){
  opts=opts||{};
  var res=await fetch(SB+'/rest/v1/'+path,{
    method:opts.method||'GET',
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':opts.prefer||''},
    body:opts.body||undefined
  });
  if(!res.ok){var e=await res.json().catch(function(){return {};});throw new Error(e.message||'HTTP '+res.status);}
  if(res.status===204)return null;
  var text=await res.text();
  if(!text||!text.trim())return null;
  try{return JSON.parse(text);}catch(e){return null;}
}

async function sbPatch(table,filter,body){
  var res=await fetch(SB+'/rest/v1/'+table+'?'+filter,{
    method:'PATCH',
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(body)
  });
  if(!res.ok){var e=await res.json().catch(function(){return {};});throw new Error(e.message||'HTTP '+res.status);}
  return true;
}

function showTab(name){
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active',['leagues','create','fixtures'][i]===name);
  });
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='leagues')loadLeagues();
  if(name==='fixtures')populateFixtureLeagueDropdowns();
}

async function populateFixtureLeagueDropdowns(){
  try{
    var leagues=await sb('leagues?order=name.asc&select=id,name');
    var addSel=document.getElementById('fx-league');
    var filterSel=document.getElementById('fx-filter-league');
    var opts='<option value="">— Select league —</option>'+leagues.map(function(l){return '<option value="'+l.id+'">'+esc(l.name)+'</option>';}).join('');
    var fopts='<option value="">— All leagues —</option>'+leagues.map(function(l){return '<option value="'+l.id+'">'+esc(l.name)+'</option>';}).join('');
    addSel.innerHTML=opts;
    filterSel.innerHTML=fopts;
  }catch(e){toast('Error loading leagues: '+e.message,true);}
}

async function loadLeagues(){
  var el=document.getElementById('leagues-list');
  el.innerHTML='<div class="lh"><span class="spin"></span> Loading…</div>';
  try{
    var leagues=await sb('leagues?order=created_at.desc&select=*');
    var teams=await sb('teams?select=id,league_id');
    if(!leagues||!leagues.length){el.innerHTML='<div class="nh">No leagues yet. Create one using the Create League tab.</div>';return;}
    el.innerHTML=leagues.map(function(l){
      var count=teams.filter(function(t){return t.league_id===l.id;}).length;
      var code=l.id.replace(/-/g,'').toUpperCase().slice(0,8);
      return '<div class="league-item">'
        +'<div class="league-name">'+esc(l.name)+'</div>'
        +'<div class="league-meta">'+l.match_night+'s &middot; '+l.num_singles+' singles &middot; '+l.num_doubles+' doubles &middot; '+(l.starting_score||501)+' starting</div>'
        +'<div class="league-actions">'
        +'<span class="code-badge">Code: '+code+'</span>'
        +'<span class="code-badge" style="color:var(--amber);border-color:#6a5200;background:#2a2000">'+count+' team'+(count!==1?'s':'')+' registered</span>'
        +'<button class="btn-admin" style="font-size:.72rem;padding:3px 10px" onclick="toggleEdit(\''+l.id+'\')">✎ Edit</button>'
        +'</div>'
        +'<div class="edit-panel" id="ep-'+l.id+'">'
        +'<h3>Edit League</h3>'
        +'<div class="grid">'
        +'<div class="field"><label>Name</label><input type="text" id="en-'+l.id+'" value="'+esc(l.name)+'"></div>'
        +'<div class="field"><label>Match Night</label><select id="eni-'+l.id+'"><option '+(l.match_night==="Monday"?"selected":"")+'>Monday</option><option '+(l.match_night==="Tuesday"?"selected":"")+'>Tuesday</option><option '+(l.match_night==="Wednesday"?"selected":"")+'>Wednesday</option><option '+(l.match_night==="Thursday"?"selected":"")+'>Thursday</option><option '+(l.match_night==="Friday"?"selected":"")+'>Friday</option><option '+(l.match_night==="Sunday"?"selected":"")+'>Sunday</option></select></div>'
        +'<div class="field"><label>Singles</label><input type="number" id="es-'+l.id+'" value="'+(l.num_singles||6)+'"></div>'
        +'<div class="field"><label>Doubles</label><input type="number" id="ed-'+l.id+'" value="'+(l.num_doubles||3)+'"></div>'
        +'<div class="field"><label>Team Game</label><select id="etg-'+l.id+'"><option value="0" '+(l.team_game_players===0?"selected":"")+'>None</option><option value="3" '+(l.team_game_players===3?"selected":"")+'>3 players</option><option value="4" '+(l.team_game_players===4?"selected":"")+'>4 players</option><option value="6" '+(l.team_game_players===6?"selected":"")+'>6 players</option></select></div>'
        +'<div class="field"><label>Singles Score</label><input type="number" id="ess-'+l.id+'" value="'+(l.starting_score||501)+'"></div>'
        +'<div class="field"><label>Doubles Score</label><input type="number" id="eds-'+l.id+'" value="'+(l.starting_score_doubles||601)+'"></div>'
        +'<div class="field"><label>Team Score</label><input type="number" id="ets-'+l.id+'" value="'+(l.starting_score_team||1001)+'"></div>'
        +'<div class="field"><label>Singles Best Of</label><select id="ebs-'+l.id+'"><option value="1" '+(l.best_of_singles===1?"selected":"")+'>1 leg</option><option value="3" '+((l.best_of_singles||3)===3?"selected":"")+'>Best of 3</option><option value="5" '+(l.best_of_singles===5?"selected":"")+'>Best of 5</option></select></div>'
        +'<div class="field"><label>Doubles Best Of</label><select id="ebd-'+l.id+'"><option value="1" '+(l.best_of_doubles===1?"selected":"")+'>1 leg</option><option value="3" '+((l.best_of_doubles||3)===3?"selected":"")+'>Best of 3</option><option value="5" '+(l.best_of_doubles===5?"selected":"")+'>Best of 5</option></select></div>'
        +'<div class="field"><label>Points Win</label><input type="number" id="epw-'+l.id+'" value="'+(l.points_win||2)+'"></div>'
        +'<div class="field"><label>Points Draw</label><input type="number" id="epd-'+l.id+'" value="'+(l.points_draw||1)+'"></div>'
        +'<div class="field"><label>Points Loss</label><input type="number" id="epl-'+l.id+'" value="'+(l.points_loss||0)+'"></div>'
        +'</div>'
        +'<div style="display:flex;gap:.5rem;margin-top:.75rem">'
        +'<button class="btn-admin" onclick="saveEdit(\''+l.id+'\')">Save</button>'
        +'<button class="btns" onclick="toggleEdit(\''+l.id+'\')">Cancel</button>'
        +'</div>'
        +'<div class="st" id="est-'+l.id+'"></div>'
        +'</div>'
        +'</div>';
    }).join('');
  }catch(e){el.innerHTML='<div class="nh">Error: '+esc(e.message)+'</div>';}
}

function toggleEdit(id){
  var p=document.getElementById('ep-'+id);
  if(p)p.classList.toggle('open');
}

async function saveEdit(id){
  var st=document.getElementById('est-'+id);
  var data={
    name:document.getElementById('en-'+id).value.trim(),
    match_night:document.getElementById('eni-'+id).value,
    num_singles:parseInt(document.getElementById('es-'+id).value),
    num_doubles:parseInt(document.getElementById('ed-'+id).value),
    team_game_players:parseInt(document.getElementById('etg-'+id).value),
    starting_score:parseInt(document.getElementById('ess-'+id).value),
    starting_score_doubles:parseInt(document.getElementById('eds-'+id).value),
    starting_score_team:parseInt(document.getElementById('ets-'+id).value),
    best_of_singles:parseInt(document.getElementById('ebs-'+id).value),
    best_of_doubles:parseInt(document.getElementById('ebd-'+id).value),
    points_win:parseInt(document.getElementById('epw-'+id).value),
    points_draw:parseInt(document.getElementById('epd-'+id).value),
    points_loss:parseInt(document.getElementById('epl-'+id).value)
  };
  if(!data.name){st.textContent='Name required';st.className='st err';return;}
  st.textContent='Saving…';st.className='st';
  try{
    await sbPatch('leagues','id=eq.'+id,data);
    st.textContent='✓ Saved!';st.className='st ok';
    setTimeout(function(){toggleEdit(id);loadLeagues();},1000);
  }catch(e){st.textContent='Error: '+e.message;st.className='st err';}
}

async function createLeague(){
  var name=document.getElementById('cl-name').value.trim();
  var pw=document.getElementById('cl-pw').value.trim();
  var st=document.getElementById('cl-status');
  var sp=document.getElementById('cl-spin');
  if(!name||!pw){st.textContent='League name and password required.';st.className='st err';return;}
  sp.style.display='inline-block';st.textContent='';
  try{
    var res=await sb('leagues',{
      method:'POST',prefer:'return=representation',
      body:JSON.stringify({
        name:name,
        admin_password:pw,
        match_night:document.getElementById('cl-night').value,
        num_singles:parseInt(document.getElementById('cl-singles').value),
        num_doubles:parseInt(document.getElementById('cl-doubles').value),
        team_game_players:parseInt(document.getElementById('cl-teamgame').value),
        starting_score:parseInt(document.getElementById('cl-sscore').value)||501,
        starting_score_doubles:parseInt(document.getElementById('cl-dscore').value)||601,
        starting_score_team:parseInt(document.getElementById('cl-tscore').value)||1001,
        best_of_singles:parseInt(document.getElementById('cl-bosing').value),
        best_of_doubles:parseInt(document.getElementById('cl-bodub').value),
        points_win:parseInt(document.getElementById('cl-pwin').value),
        points_draw:parseInt(document.getElementById('cl-pdraw').value),
        points_loss:parseInt(document.getElementById('cl-ploss').value)
      })
    });
    var code=res[0].id.replace(/-/g,'').toUpperCase().slice(0,8);
    st.innerHTML='<span style="color:var(--gl)">✓ League created!</span> Registration code: <strong style="color:var(--amber);font-size:1.1rem;letter-spacing:.1em">'+code+'</strong>';
    st.className='st';
    document.getElementById('cl-name').value='';
    document.getElementById('cl-pw').value='';
  }catch(e){st.textContent='Error: '+e.message;st.className='st err';}
  sp.style.display='none';
}

// ── Fixtures ──────────────────────────────────────────────────────────────────
async function loadFixtureTeams(){
  var leagueId=document.getElementById('fx-league').value;
  var home=document.getElementById('fx-home');
  var away=document.getElementById('fx-away');
  home.innerHTML='<option value="">— Select —</option>';
  away.innerHTML='<option value="">— Select —</option>';
  if(!leagueId)return;
  try{
    var teams=await sb('teams?league_id=eq.'+leagueId+'&order=team_name.asc&select=id,team_name');
    teams.forEach(function(t){
      home.innerHTML+='<option value="'+t.id+'">'+esc(t.team_name)+'</option>';
      away.innerHTML+='<option value="'+t.id+'">'+esc(t.team_name)+'</option>';
    });
  }catch(e){toast('Error loading teams: '+e.message,true);}
}

async function addFixture(){
  var leagueId=document.getElementById('fx-league').value;
  var date=document.getElementById('fx-date').value;
  var homeId=document.getElementById('fx-home').value;
  var awayId=document.getElementById('fx-away').value;
  var season=parseInt(document.getElementById('fx-season').value)||1;
  var st=document.getElementById('fx-status');
  var sp=document.getElementById('fx-spin');
  if(!leagueId||!date||!homeId||!awayId){st.textContent='Please fill in all fields.';st.className='st err';return;}
  if(homeId===awayId){st.textContent='Home and away teams must be different.';st.className='st err';return;}
  sp.style.display='inline-block';st.textContent='';
  try{
    await sb('league_fixtures',{
      method:'POST',prefer:'return=minimal',
      body:JSON.stringify({league_id:leagueId,home_team_id:homeId,away_team_id:awayId,fixture_date:date,season:season,played:false})
    });
    st.textContent='✓ Fixture added!';st.className='st ok';
    document.getElementById('fx-home').value='';
    document.getElementById('fx-away').value='';
    document.getElementById('fx-date').value='';
    loadFixtureList();
  }catch(e){st.textContent='Error: '+e.message;st.className='st err';}
  sp.style.display='none';
}

async function loadFixtureList(){
  var leagueId=document.getElementById('fx-filter-league').value;
  var el=document.getElementById('fixture-list');
  if(!leagueId){el.innerHTML='<div class="nh">Select a league to view fixtures</div>';return;}
  el.innerHTML='<div class="lh"><span class="spin"></span> Loading…</div>';
  try{
    var fixtures=await sb('league_fixtures?league_id=eq.'+leagueId+'&order=fixture_date.asc&select=*');
    var teams=await sb('teams?league_id=eq.'+leagueId+'&select=id,team_name');
    var teamMap={};teams.forEach(function(t){teamMap[t.id]=t.team_name;});
    if(!fixtures||!fixtures.length){el.innerHTML='<div class="nh">No fixtures yet for this league.</div>';return;}
    el.innerHTML=fixtures.map(function(f){
      var d=new Date(f.fixture_date+'T00:00:00');
      var fmt=d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
      var statusStyle=f.played?'background:#1a2a1e;color:var(--gl);border:1px solid var(--green)':'background:var(--s3);color:var(--dim);border:1px solid var(--border)';
      var statusText=f.played?'Played':'Upcoming';
      return '<div style="display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:5px;margin-bottom:.4rem;flex-wrap:wrap">'
        +'<div style="font-size:.8rem;color:var(--dim);min-width:120px">'+fmt+'</div>'
        +'<div style="flex:1;font-size:.9rem;font-weight:600">'+esc(teamMap[f.home_team_id]||'?')+' <span style="color:var(--dim);font-weight:400">vs</span> '+esc(teamMap[f.away_team_id]||'?')+'</div>'
        +'<div style="font-size:.75rem;padding:2px 8px;border-radius:3px;'+statusStyle+'">'+statusText+'</div>'
        +'<button onclick="deleteFixture(&quot;'+f.id+'&quot;)" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:.72rem;padding:2px 8px;cursor:pointer">Delete</button>'
        +'</div>';
    }).join('');
  }catch(e){el.innerHTML='<div class="nh">Error: '+esc(e.message)+'</div>';}
}

async function deleteFixture(id){
  if(!confirm('Delete this fixture?'))return;
  try{
    await sb('league_fixtures?id=eq.'+id,{method:'DELETE'});
    toast('Fixture deleted');
    loadFixtureList();
  }catch(e){toast('Error: '+e.message,true);}
}

function toast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(isErr?' err':'')+' show';
  setTimeout(function(){t.classList.remove('show');},2500);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Init
loadLeagues();
</script>
</body>
</html>
