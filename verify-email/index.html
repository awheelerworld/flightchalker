<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — Flight Chalker</title>
<meta name="robots" content="noindex, nofollow">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WQRGJRFF1Q"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-WQRGJRFF1Q');</script>
<script src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#141814;--surface:#1e251e;--s3:#2e382e;--green:#4a7c59;--gl:#5a9469;--amber:#e8c840;--red:#c0392b;--text:#e0d8c8;--dim:#8a9080;--border:#3a4a3a}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.logo{text-align:center;margin-bottom:2rem}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;letter-spacing:.05em;text-transform:uppercase}
.logo-title span{color:var(--amber)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;width:100%;max-width:400px;text-align:center}
.card .icon{font-size:3rem;margin-bottom:1rem}
.card h2{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:.5rem}
.card p{font-size:.85rem;color:var(--dim);margin-bottom:1.5rem;line-height:1.6}
.card p strong{color:var(--text)}
.code-inputs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.code-inputs input{width:44px;height:52px;background:var(--bg);border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;text-align:center;transition:border-color .15s}
.code-inputs input:focus{outline:none;border-color:var(--amber)}
.code-inputs input.filled{border-color:var(--green)}
.btn-verify{width:100%;background:var(--green);border:none;border-radius:8px;color:white;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.75rem;cursor:pointer;transition:background .15s;margin-bottom:.75rem}
.btn-verify:hover{background:var(--gl)}
.btn-verify:disabled{opacity:.5;cursor:not-allowed}
.btn-resend{background:none;border:none;color:var(--gl);font-family:'Barlow',sans-serif;font-size:.85rem;cursor:pointer;text-decoration:underline}
.error{font-size:.82rem;color:var(--red);margin-bottom:.75rem;display:none}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:white;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;padding:.6rem 1.5rem;border-radius:6px;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
</style>
</head>
<body>

<div class="logo">
  <a href="/" style="text-decoration:none;color:inherit">
    <div class="logo-title">Flight <span>Chalker</span></div>
  </a>
</div>

<div class="card">
  <div class="icon">📧</div>
  <h2>Check Your Email</h2>
  <p>We've sent a 6-digit verification code to <strong id="email-display">your email</strong>. Enter it below to activate your account.</p>

  <div class="code-inputs" id="code-inputs">
    <input type="text" maxlength="1" class="code-digit" id="d0" oninput="digitInput(0)" onkeydown="digitKey(event,0)">
    <input type="text" maxlength="1" class="code-digit" id="d1" oninput="digitInput(1)" onkeydown="digitKey(event,1)">
    <input type="text" maxlength="1" class="code-digit" id="d2" oninput="digitInput(2)" onkeydown="digitKey(event,2)">
    <input type="text" maxlength="1" class="code-digit" id="d3" oninput="digitInput(3)" onkeydown="digitKey(event,3)">
    <input type="text" maxlength="1" class="code-digit" id="d4" oninput="digitInput(4)" onkeydown="digitKey(event,4)">
    <input type="text" maxlength="1" class="code-digit" id="d5" oninput="digitInput(5)" onkeydown="digitKey(event,5)">
  </div>

  <div class="error" id="verify-error"></div>

  <button class="btn-verify" id="verify-btn" onclick="verifyCode()">Verify Email</button>
  <button class="btn-resend" id="resend-btn" onclick="resendCode()">Resend code</button>
</div>

<div class="toast" id="toast"></div>

<script>
const CLERK_KEY = 'pk_test_dGhhbmtmdWwtb3dsLTg3LmNsZXJrLmFjY291bnRzLmRldiQ';

function toast(msg, isErr=false){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(isErr?' err':'')+' show';
  setTimeout(function(){t.classList.remove('show');},3000);
}

// Show email from pending signup
var pending = JSON.parse(localStorage.getItem('fc_pending_signup')||'{}');
if(pending.email){
  document.getElementById('email-display').textContent = pending.email;
}

// Code input handling - auto advance between boxes
function digitInput(idx){
  var inp = document.getElementById('d'+idx);
  var val = inp.value.replace(/[^0-9]/g,'');
  inp.value = val;
  if(val){
    inp.classList.add('filled');
    if(idx < 5) document.getElementById('d'+(idx+1)).focus();
    else verifyCode();
  } else {
    inp.classList.remove('filled');
  }
}

function digitKey(e, idx){
  if(e.key==='Backspace' && !document.getElementById('d'+idx).value && idx>0){
    document.getElementById('d'+(idx-1)).focus();
  }
  // Allow paste
  if(e.key==='v' && (e.ctrlKey||e.metaKey)){
    setTimeout(function(){
      var full = '';
      for(var i=0;i<6;i++) full += document.getElementById('d'+i).value;
      if(full.length < 6){
        // Try to get from clipboard paste into first box
        var first = document.getElementById('d0').value;
        if(first.length >= 6){
          for(var i=0;i<6;i++){
            var el = document.getElementById('d'+i);
            el.value = first[i]||'';
            if(el.value) el.classList.add('filled');
          }
          document.getElementById('d0').value = first[0];
        }
      }
    },50);
  }
}

function getCode(){
  var code = '';
  for(var i=0;i<6;i++) code += document.getElementById('d'+i).value;
  return code;
}

async function verifyCode(){
  var code = getCode();
  if(code.length < 6){
    document.getElementById('verify-error').textContent='Please enter all 6 digits';
    document.getElementById('verify-error').style.display='block';
    return;
  }
  document.getElementById('verify-error').style.display='none';
  var btn = document.getElementById('verify-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>Verifying...';
  try{
    const result = await window.Clerk.client.signUp.attemptEmailAddressVerification({code});
    if(result.status === 'complete'){
      await window.Clerk.setActive({session: result.createdSessionId});
      localStorage.removeItem('fc_pending_signup');
      toast('Email verified! Welcome to Flight Chalker 🎯');
      setTimeout(function(){window.location.href='/dashboard';}, 1000);
    } else {
      throw new Error('Verification incomplete');
    }
  }catch(e){
    var msg = e.errors ? e.errors[0].longMessage||e.errors[0].message : 'Invalid code. Please try again.';
    document.getElementById('verify-error').textContent = msg;
    document.getElementById('verify-error').style.display='block';
    btn.disabled=false;
    btn.innerHTML='Verify Email';
  }
}

async function resendCode(){
  var btn = document.getElementById('resend-btn');
  btn.disabled=true;btn.textContent='Sending...';
  try{
    await window.Clerk.client.signUp.prepareEmailAddressVerification({strategy:'email_code'});
    toast('New code sent!');
    btn.textContent='Resend code';
    btn.disabled=false;
  }catch(e){
    toast('Could not resend. Please try again.',true);
    btn.textContent='Resend code';
    btn.disabled=false;
  }
}

window.addEventListener('load', async function(){
  try{
    const clerk = new window.Clerk(CLERK_KEY);
    await clerk.load();
    window.Clerk = clerk;
    if(clerk.user){window.location.href='/dashboard';return;}
    document.getElementById('d0').focus();
  }catch(e){console.error(e);}
});
</script>
</body>
</html>
