<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="description" content="Sign in to your Flight Chalker account to access the scorer, training zone and your stats.">
  <meta name="author" content="awheelerworld">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://flightchalker.co.uk/login">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Player Login — Flight Chalker">
  <meta property="og:description" content="Sign in to Flight Chalker to access the darts scorer, training zone and leaderboards.">
  <meta property="og:url" content="https://flightchalker.co.uk/login">
  <meta property="og:image" content="https://flightchalker.co.uk/og-image.png">
  <meta property="og:site_name" content="Flight Chalker">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Player Login — Flight Chalker">
  <meta name="twitter:description" content="Sign in to Flight Chalker to access the darts scorer, training zone and leaderboards.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Login — Flight Chalker</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WQRGJRFF1Q"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-WQRGJRFF1Q');</script>
<script src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#141814;--surface:#1e251e;--s3:#2e382e;--green:#4a7c59;--gl:#5a9469;--amber:#e8c840;--red:#c0392b;--text:#e0d8c8;--dim:#8a9080;--border:#3a4a3a}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.logo{text-align:center;margin-bottom:2rem}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;letter-spacing:.05em;text-transform:uppercase}
.logo-title span{color:var(--amber)}
.logo-sub{font-size:.8rem;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;width:100%;max-width:400px}
.card h2{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:.4rem}
.card p{font-size:.85rem;color:var(--dim);margin-bottom:1.5rem}
.btn-google{display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;background:white;border:none;border-radius:8px;color:#333;font-family:'Barlow',sans-serif;font-size:.95rem;font-weight:600;padding:.75rem;cursor:pointer;margin-bottom:1rem;transition:opacity .15s}
.btn-google:hover{opacity:.9}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:.75rem;color:var(--dim);white-space:nowrap}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem}
.field label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
.field input{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.95rem;padding:.55rem .75rem}
.field input:focus{outline:none;border-color:var(--green)}
.btn-submit{width:100%;background:var(--green);border:none;border-radius:8px;color:white;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.75rem;cursor:pointer;margin-top:.5rem;transition:background .15s}
.btn-submit:hover{background:var(--gl)}
.links{display:flex;justify-content:space-between;margin-top:1rem;font-size:.8rem}
.links a{color:var(--gl);text-decoration:none}
.error{font-size:.8rem;color:var(--red);margin-top:.5rem;display:none}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:white;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;padding:.6rem 1.5rem;border-radius:6px;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="logo">
  <a href="/" style="text-decoration:none;color:inherit">
    <div class="logo-title">Flight <span>Chalker</span></div>
    <div class="logo-sub">Darts League Platform</div>
  </a>
</div>

<div class="card">
  <h2>Player Login</h2>
  <p>Sign in to access the scorer, training zone and your stats.</p>

  <button class="btn-google" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><span>or sign in with email</span></div>

  <div class="field">
    <label>Email or Username</label>
    <input type="text" id="identifier" placeholder="Email or username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Your password" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="error" id="login-error"></div>

  <button class="btn-submit" id="login-btn" onclick="login()">Sign In</button>

  <div class="links">
    <a href="/join">Create free account</a>
    <a href="/forgot-password">Forgot password?</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLERK_KEY = 'pk_live_Y2xlcmsuZmxpZ2h0Y2hhbGtlci5jby51ayQ';

function toast(msg,isErr=false){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(isErr?' err':'')+' show';
  setTimeout(function(){t.classList.remove('show');},3000);
}

async function signInWithGoogle(){
  try{
    await window.Clerk.authenticateWithRedirect({
      strategy:'oauth_google',
      redirectUrl:'/dashboard',
      redirectUrlComplete:'/dashboard'
    });
  }catch(e){toast('Google sign in failed',true);}
}

async function login(){
  var identifier=document.getElementById('identifier').value.trim();
  var password=document.getElementById('password').value;
  var errEl=document.getElementById('login-error');
  errEl.style.display='none';
  if(!identifier||!password){errEl.textContent='Please enter your email/username and password';errEl.style.display='block';return;}
  var btn=document.getElementById('login-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Signing in...';
  try{
    const signIn=await window.Clerk.client.signIn.create({identifier,password});
    await window.Clerk.setActive({session:signIn.createdSessionId});
    toast('Welcome back! \uD83C\uDFAF');
    setTimeout(function(){window.location.href='/dashboard';},800);
  }catch(e){
    errEl.textContent=e.errors?e.errors[0].longMessage||e.errors[0].message:'Sign in failed. Please check your details.';
    errEl.style.display='block';
    btn.disabled=false;btn.innerHTML='Sign In';
  }
}

window.addEventListener('load',async function(){
  try{
    const clerk=new window.Clerk(CLERK_KEY);
    await clerk.load();
    window.Clerk=clerk;
    if(clerk.user){window.location.href='/dashboard';}
  }catch(e){console.error('Clerk:',e);}
});
</script>
</body>
</html>
